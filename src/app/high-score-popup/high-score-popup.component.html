<div class="high-score-container bebas-neue-regular">
  <div class="confetti"></div>
  <div class="high-score-content">
    <div class="stars">
      <span class="star">⭐</span>
      <span class="star">⭐</span>
      <span class="star">⭐</span>
    </div>
    <h1 class="title">NEW HIGH SCORE!</h1>
    <div class="score-display">{{ data.score | number: "1.1-1" }}</div>
    <p class="congratulations">Congratulations {{data.name}}!</p>
    <button mat-raised-button color="primary" (click)="onClose()">
        Continue
    </button>
  </div>
</div>
